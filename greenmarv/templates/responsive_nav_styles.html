<script>
    // ============================================
    // DROPDOWN TOGGLE — standalone, robust version
    // Put this BEFORE </body>, or AFTER your existing script
    // ============================================
    (function() {
        function initDropdowns() {
            const dropdowns = document.querySelectorAll('.mg-dropdown');
            console.log('Dropdowns found:', dropdowns.length);  // Debug: check console
 
            if (dropdowns.length === 0) return;
 
            dropdowns.forEach(dropdown => {
                const toggle = dropdown.querySelector('.mg-dropdown-toggle');
                if (!toggle) {
                    console.warn('No toggle button found in dropdown', dropdown);
                    return;
                }
 
                // Click toggle → open/close
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
 
                    // Close other open dropdowns first
                    dropdowns.forEach(d => {
                        if (d !== dropdown) d.classList.remove('open');
                    });
 
                    // Toggle this one
                    dropdown.classList.toggle('open');
                    console.log('Dropdown toggled:', dropdown.classList.contains('open'));
                });
            });
 
            // Click anywhere else → close all dropdowns
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.mg-dropdown')) {
                    dropdowns.forEach(d => d.classList.remove('open'));
                }
            });
 
            // Escape key → close
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    dropdowns.forEach(d => d.classList.remove('open'));
                }
            });
        }
 
        // Run on DOM ready, or immediately if already ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initDropdowns);
        } else {
            initDropdowns();
        }
    })();
</script>

<script>
    // ============================================
    // DROPDOWN TOGGLE (desktop profile/admin)
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        // Desktop dropdowns
        const dropdowns = document.querySelectorAll('[data-nav-dropdown]');
        dropdowns.forEach(dropdown => {
            const toggle = dropdown.querySelector('.mg-dropdown-toggle');
            if (!toggle) return;

            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdowns.forEach(d => { if (d !== dropdown) d.classList.remove('open'); });
                dropdown.classList.toggle('open');
            });
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('[data-nav-dropdown]')) {
                dropdowns.forEach(d => d.classList.remove('open'));
            }
        });

        // ============================================
        // MOBILE MENU TOGGLE
        // ============================================
        const hamburger = document.getElementById('mgHamburger');
        const closeBtn = document.getElementById('mgMobileClose');
        const mobileMenu = document.getElementById('mgMobileMenu');
        const overlay = document.getElementById('mgMobileOverlay');

        function openMobileMenu() {
            mobileMenu.classList.add('open');
            overlay.classList.add('open');
            document.body.classList.add('mg-menu-open');
        }

        function closeMobileMenu() {
            mobileMenu.classList.remove('open');
            overlay.classList.remove('open');
            document.body.classList.remove('mg-menu-open');
        }

        if (hamburger) hamburger.addEventListener('click', openMobileMenu);
        if (closeBtn) closeBtn.addEventListener('click', closeMobileMenu);
        if (overlay) overlay.addEventListener('click', closeMobileMenu);

        // Close mobile menu when a link is tapped (except external-tagged ones)
        document.querySelectorAll('.mg-mobile-link, .mg-mobile-cta').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Close on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMobileMenu();
                dropdowns.forEach(d => d.classList.remove('open'));
            }
        });

        // ============================================
        // STICKY HEADER SCROLL EFFECT
        // ============================================
        const header = document.getElementById('header');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    });
</script>
