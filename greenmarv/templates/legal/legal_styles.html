<style>
    /* ============================================ */
    /* LEGAL HERO */
    /* ============================================ */
    .legal-hero {
        background: linear-gradient(135deg, #1b3022 0%, #2d5016 50%, #c5a059 100%);
        padding: 3.5rem 5% 3rem;
        color: #fcf8ef;
        position: relative;
        overflow: hidden;
        text-align: center;
    }

    .legal-hero::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="white" fill-opacity="0.03" width="100" height="100"/></svg>');
        pointer-events: none;
    }

    .legal-hero-container {
        max-width: 1100px;
        margin: 0 auto;
        position: relative;
        z-index: 2;
    }

    .legal-hero-badge {
        background: rgba(27, 48, 34, 0.4);
        border: 1px solid #c5a059;
        color: #fcf8ef;
        padding: 0.4rem 1.1rem;
        border-radius: 30px;
        display: inline-block;
        margin-bottom: 1rem;
        font-size: 0.72rem;
        letter-spacing: 2px;
        font-weight: 700;
    }

    .legal-hero-title {
        font-size: 3rem;
        font-weight: 800;
        color: #fcf8ef;
        margin-bottom: 0.5rem;
        letter-spacing: -0.8px;
    }

    .legal-hero-title span {
        color: #c5a059;
        font-style: italic;
    }

    .legal-hero-meta {
        color: #fcf8ef;
        opacity: 0.85;
        font-size: 0.9rem;
        font-weight: 500;
    }

    /* ============================================ */
    /* LAYOUT */
    /* ============================================ */
    .legal-section {
        padding: 3rem 5% 5rem;
        background: #fafbf9;
        min-height: 60vh;
    }

    .legal-container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 2rem;
        align-items: start;
    }

    /* ============================================ */
    /* SIDEBAR TOC */
    /* ============================================ */
    .legal-sidebar {
        position: sticky;
        top: 100px;
    }

    .legal-toc {
        background: white;
        border-radius: 16px;
        padding: 1.25rem;
        border: 1px solid rgba(197, 160, 89, 0.15);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }

    .toc-label {
        color: #999;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #f0f0f0;
    }

    .toc-link {
        display: block;
        padding: 0.5rem 0.75rem;
        color: #555;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        border-radius: 8px;
        transition: all 0.25s;
        margin-bottom: 0.15rem;
    }

    .toc-link:hover {
        background: #f8fdf8;
        color: #2d5016;
        transform: translateX(2px);
    }

    .toc-related {
        margin-top: 1.25rem;
        padding-top: 1rem;
        border-top: 1px solid #f0f0f0;
    }

    .toc-related-link {
        display: block;
        padding: 0.6rem 0.75rem;
        background: #f8fdf8;
        color: #2d5016;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        border-radius: 8px;
        margin-bottom: 0.4rem;
        transition: all 0.25s;
        border: 1px solid transparent;
    }

    .toc-related-link:hover {
        background: white;
        border-color: #c5a059;
        color: #c5a059;
    }

    /* ============================================ */
    /* MAIN CONTENT */
    /* ============================================ */
    .legal-content {
        background: white;
        border-radius: 20px;
        padding: 2.5rem;
        border: 1px solid rgba(197, 160, 89, 0.15);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.04);
        position: relative;
    }

    .legal-content::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(90deg, #2d5016, #c5a059, #2d5016);
        border-radius: 20px 20px 0 0;
    }

    /* Intro card */
    .legal-intro-card {
        display: flex;
        gap: 1.25rem;
        padding: 1.5rem;
        background: linear-gradient(135deg, #f8fdf8, #e8f5e9);
        border: 1px solid rgba(197, 160, 89, 0.3);
        border-radius: 14px;
        margin-bottom: 2.5rem;
        align-items: flex-start;
    }

    .intro-icon {
        font-size: 2.5rem;
        flex-shrink: 0;
    }

    .legal-intro-card strong {
        display: block;
        color: #2d5016;
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 0.4rem;
    }

    .legal-intro-card p {
        color: #555;
        font-size: 0.92rem;
        line-height: 1.6;
        margin: 0;
    }

    /* Articles */
    .legal-article {
        margin-bottom: 2.5rem;
        scroll-margin-top: 100px;
    }

    .legal-article h2 {
        color: #2d5016;
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #c5a059;
        letter-spacing: -0.3px;
    }

    .legal-article h3 {
        color: #2d5016;
        font-size: 1.1rem;
        font-weight: 700;
        margin: 1.5rem 0 0.75rem;
    }

    .legal-article p {
        color: #444;
        line-height: 1.75;
        margin-bottom: 1rem;
        font-size: 0.97rem;
    }

    .legal-article strong {
        color: #2d5016;
        font-weight: 700;
    }

    .legal-article a {
        color: #c5a059;
        text-decoration: underline;
        font-weight: 600;
    }

    .legal-article a:hover {
        color: #2d5016;
    }

    /* Lists */
    .legal-list {
        padding-left: 1.5rem;
        margin-bottom: 1rem;
    }

    .legal-list li {
        color: #444;
        line-height: 1.7;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
        padding-left: 0.25rem;
    }

    .legal-list li::marker {
        color: #c5a059;
    }

    /* Callout boxes */
    .legal-callout {
        padding: 1rem 1.25rem;
        background: linear-gradient(135deg, #f8fdf8, #e8f5e9);
        border-left: 4px solid #c5a059;
        border-radius: 8px;
        margin: 1.25rem 0;
        color: #2d5016;
        font-size: 0.92rem;
        line-height: 1.6;
    }

    .legal-callout.warning {
        background: #fff9e6;
        border-left-color: #c5a059;
        color: #8a6d2e;
    }

    .legal-callout strong {
        font-weight: 800;
    }

    .legal-callout a {
        color: #2d5016;
    }

    /* Rights/info grids */
    .rights-grid,
    .info-share-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin: 1.25rem 0;
    }

    .right-card,
    .share-card {
        display: flex;
        gap: 0.85rem;
        padding: 1rem;
        background: #f8fdf8;
        border: 1px solid rgba(197, 160, 89, 0.2);
        border-radius: 12px;
        transition: all 0.3s;
    }

    .right-card:hover,
    .share-card:hover {
        border-color: #c5a059;
        background: white;
        transform: translateY(-2px);
    }

    .share-card {
        flex-direction: column;
        align-items: flex-start;
    }

    .right-icon,
    .share-icon {
        font-size: 1.5rem;
        flex-shrink: 0;
    }

    .share-icon {
        margin-bottom: 0.5rem;
    }

    .right-card strong,
    .share-card h4 {
        display: block;
        color: #2d5016;
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
    }

    .right-card p,
    .share-card p {
        color: #555;
        font-size: 0.85rem;
        line-height: 1.5;
        margin: 0;
    }

    /* Contact card */
    .contact-card {
        background: linear-gradient(135deg, #f8fdf8, #e8f5e9);
        border: 1px solid rgba(197, 160, 89, 0.3);
        border-radius: 14px;
        padding: 1.5rem;
        margin: 1.25rem 0;
    }

    .contact-row {
        display: flex;
        gap: 1rem;
        padding: 0.6rem 0;
        align-items: center;
        border-bottom: 1px dashed rgba(197, 160, 89, 0.2);
    }

    .contact-row:last-child {
        border-bottom: none;
    }

    .contact-icon {
        font-size: 1.3rem;
        flex-shrink: 0;
        width: 32px;
        text-align: center;
    }

    .contact-row strong {
        display: block;
        color: #2d5016;
        font-weight: 700;
    }

    .contact-row span {
        color: #666;
        font-size: 0.85rem;
    }

    .contact-row a {
        color: #c5a059;
        text-decoration: none;
        font-weight: 600;
    }

    .contact-row a:hover {
        color: #2d5016;
        text-decoration: underline;
    }

    /* Cookie tables */
    .cookie-table-wrap {
        overflow-x: auto;
        margin: 1rem 0;
        border-radius: 12px;
        border: 1px solid rgba(197, 160, 89, 0.2);
    }

    .cookie-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
    }

    .cookie-table thead {
        background: linear-gradient(135deg, #2d5016, #4CAF50);
    }

    .cookie-table thead th {
        color: #c5a059;
        padding: 0.85rem 1rem;
        text-align: left;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .cookie-table tbody tr {
        border-bottom: 1px solid #f0f0f0;
    }

    .cookie-table tbody tr:last-child {
        border-bottom: none;
    }

    .cookie-table tbody tr:hover {
        background: #f8fdf8;
    }

    .cookie-table tbody td {
        padding: 0.85rem 1rem;
        color: #444;
    }

    .cookie-table code {
        background: #f8fdf8;
        color: #2d5016;
        padding: 0.15rem 0.5rem;
        border-radius: 6px;
        font-size: 0.82rem;
        font-family: 'Courier New', monospace;
        font-weight: 600;
        border: 1px solid #e8f5e9;
    }

    /* Footer note */
    .legal-footer-note {
        margin-top: 2.5rem;
        padding-top: 1.5rem;
        border-top: 2px solid #f0f0f0;
        text-align: center;
    }

    .legal-footer-note p {
        color: #666;
        font-size: 0.88rem;
        font-style: italic;
        line-height: 1.7;
        margin: 0;
    }

    /* ============================================ */
    /* RESPONSIVE */
    /* ============================================ */
    @media (max-width: 900px) {
        .legal-container {
            grid-template-columns: 1fr;
        }

        .legal-sidebar {
            position: static;
        }

        .legal-toc {
            display: none; /* hide on mobile to save space */
        }

        .legal-hero-title {
            font-size: 2.25rem;
        }

        .legal-content {
            padding: 1.75rem 1.5rem;
        }

        .rights-grid,
        .info-share-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 500px) {
        .legal-hero-title {
            font-size: 1.85rem;
        }

        .legal-intro-card {
            flex-direction: column;
            text-align: center;
            padding: 1.25rem;
        }

        .legal-article h2 {
            font-size: 1.25rem;
        }
    }

    /* Smooth scroll for TOC anchors */
    html {
        scroll-behavior: smooth;
    }
</style>
